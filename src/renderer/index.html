<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companion</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="app">
    <div id="live2d-canvas"></div>
    <div id="chat-container">
      <div id="chat-header">
        <button id="settings-btn" title="設定" aria-label="設定を開く" data-i18n-title="app.settings.title" data-i18n-aria-label="app.settings.ariaLabel">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
      <div id="messages" role="log" aria-live="polite"></div>
      <div id="attachment-preview" style="display:none;">
        <span id="attachment-name"></span>
        <button id="attachment-clear" aria-label="添付を解除" data-i18n-aria-label="app.attachment.clear">✕</button>
      </div>
      <div id="input-area">
        <div id="input-row">
          <button id="file-btn" class="file-btn" title="ファイル添付" aria-label="ファイルを添付" data-i18n-title="app.file.title" data-i18n-aria-label="app.file.ariaLabel">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
            </svg>
          </button>
          <button id="mic-btn" class="mic-btn" title="音声入力 (Ctrl+M)" aria-label="マイク: 待機中" data-i18n-title="app.mic.title" data-i18n-aria-label="app.mic.idle">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
          <button id="agent-toggle-btn" class="agent-toggle-btn" title="エージェントモード OFF" aria-label="エージェントモード: OFF" data-i18n-title="app.agent.titleOff" data-i18n-aria-label="app.agent.ariaOff" style="display:none;">
            <span style="font-size:16px;line-height:1;">&#x1F99E;</span>
          </button>
          <textarea id="user-input" rows="1" placeholder="話しかける..." data-i18n-placeholder="app.input.placeholder"></textarea>
          <button id="send-btn" aria-label="送信" data-i18n-aria-label="app.send">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"></line>
              <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
          </button>
        </div>
      </div>
      <input type="file" id="file-input" accept=".txt,.md,.csv,.json,.log,.pdf,.jpg,.jpeg,.png,.gif,.webp" style="display: none;">
    </div>
  </div>

  <script type="module">
    import { initPlatform } from './platform';
    initPlatform().then(() => import('./app'));
  </script>
</body>

</html>
