<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #header {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      font-size: 12px;
      opacity: 0.6;
      gap: 6px;
    }

    #header .name {
      font-weight: 600;
    }

    #header .status {
      margin-left: auto;
      font-size: 10px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scrollbar-width: none;
    }

    #messages::-webkit-scrollbar { display: none; }

    .msg {
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 16px;
      line-height: 1.5;
      max-width: 100%;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease;
    }

    .msg.assistant {
      background: rgba(100, 140, 255, 0.25);
      border-left: 3px solid rgba(100, 140, 255, 0.6);
    }

    .msg.user {
      background: rgba(255, 255, 255, 0.1);
      border-left: 3px solid rgba(255, 255, 255, 0.3);
      font-size: 13px;
      opacity: 0.7;
    }

    .msg.streaming::after {
      content: '|';
      animation: blink 0.8s infinite;
      opacity: 0.5;
    }

    #input-area {
      padding: 6px 12px;
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    #input-area input {
      flex: 1;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #fff;
      padding: 6px 10px;
      font-size: 14px;
      outline: none;
    }

    #input-area input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    #input-area button {
      background: rgba(100, 140, 255, 0.4);
      border: none;
      border-radius: 6px;
      color: #fff;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    #input-area button:hover {
      background: rgba(100, 140, 255, 0.6);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="header">
    <span class="name" id="companion-name">Companion</span>
    <span class="status" id="status">VR Overlay</span>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input type="text" id="input" placeholder="メッセージ..." data-i18n-placeholder="vrOverlay.input.placeholder" autocomplete="off">
    <button id="send-btn" data-i18n="vrOverlay.send">送信</button>
  </div>
  <script type="module" src="./vr-overlay.ts"></script>
</body>
</html>
