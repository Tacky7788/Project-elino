<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companion (Docked)</title>
  <!-- Cubism Core (Local) for Live2D -->
  <script src="/lib/live2dcubismcore.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    /* Custom titlebar */
    #docked-titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 32px;
      padding: 0 12px;
      background: var(--bg-secondary, #1e1e22);
      border-bottom: 1px solid var(--border-input, #3f3f46);
      -webkit-app-region: drag;
      user-select: none;
      flex-shrink: 0;
    }

    #docked-titlebar .title-text {
      font-size: 12px;
      color: var(--text-secondary, #a1a1aa);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    #docked-titlebar .titlebar-btns {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    #docked-titlebar .titlebar-btn {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary, #a1a1aa);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.15s;
    }

    #docked-titlebar .titlebar-btn:hover {
      background: var(--bg-settings-btn-hover, rgba(255,255,255,0.08));
      color: var(--text-primary, #e4e4e7);
    }

    #docked-titlebar .titlebar-btn.close-btn:hover {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    /* Main layout */
    #docked-root {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      background: var(--bg-primary, rgba(24, 24, 27, 0.97));
    }

    #docked-body {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* Left: character pane (40%) */
    #docked-char-pane {
      width: 40%;
      flex-shrink: 0;
      position: relative;
      background: transparent;
      overflow: hidden;
    }

    #live2d-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #model-error-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif;
      font-size: 13px;
      padding: 16px;
      text-align: center;
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
    }

    #model-error-overlay.visible {
      display: flex;
    }

    #model-error-overlay .error-icon {
      font-size: 32px;
    }

    #model-error-overlay .error-msg {
      word-break: break-all;
      max-width: 260px;
      line-height: 1.4;
    }

    /* Divider */
    #docked-divider {
      width: 1px;
      background: var(--border-input, #3f3f46);
      flex-shrink: 0;
    }

    /* Right: chat pane (60%) */
    #docked-chat-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    /* Override styles.css #app to fit the pane */
    #docked-chat-pane #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      border-radius: 0;
      box-shadow: none;
      -webkit-app-region: no-drag;
    }

    #docked-chat-pane #chat-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      border-radius: 0;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div id="docked-root">
    <!-- Titlebar -->
    <div id="docked-titlebar">
      <span class="title-text">ELINO</span>
      <div class="titlebar-btns">
        <button class="titlebar-btn" id="titlebar-settings" title="設定" aria-label="設定">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
        <button class="titlebar-btn close-btn" id="titlebar-minimize" title="最小化" aria-label="最小化">&#x2212;</button>
        <button class="titlebar-btn close-btn" id="titlebar-close" title="閉じる" aria-label="閉じる">&#x2715;</button>
      </div>
    </div>

    <!-- Body: char + chat side by side -->
    <div id="docked-body">
      <!-- Character pane (left 40%) -->
      <div id="docked-char-pane">
        <canvas id="live2d-canvas"></canvas>
        <div id="model-error-overlay">
          <div class="error-icon">&#x26A0;</div>
          <div class="error-msg" id="model-error-msg">モデルの読み込みに失敗しました</div>
        </div>
      </div>

      <div id="docked-divider"></div>

      <!-- Settings pane (hidden by default, replaces chat) -->
      <div id="docked-settings-pane" style="display:none; flex:1; min-width:0; overflow:hidden; flex-direction:column;">
        <div style="display:flex; align-items:center; padding:8px 12px; background:var(--bg-secondary, #1e1e22); border-bottom:1px solid var(--border-input, #3f3f46); -webkit-app-region:no-drag;">
          <button id="settings-back-btn" style="background:none; border:none; color:var(--text-secondary, #a1a1aa); cursor:pointer; padding:4px 8px; border-radius:4px; font-size:13px; display:flex; align-items:center; gap:4px;" title="戻る">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            戻る
          </button>
        </div>
        <iframe id="settings-iframe" style="flex:1; width:100%; border:none;"></iframe>
      </div>

      <!-- Chat pane (right 60%) -->
      <div id="docked-chat-pane">
        <div id="app">
          <div id="chat-container">
            <div id="chat-header">
              <!-- settings button hidden in docked (accessible via titlebar) -->
              <button id="settings-btn" title="設定" aria-label="設定を開く" style="display:none;" data-i18n-title="app.settings.title" data-i18n-aria-label="app.settings.ariaLabel">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"></circle>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
              </button>
            </div>
            <div id="messages" role="log" aria-live="polite"></div>
            <div id="attachment-preview" style="display:none;">
              <span id="attachment-name"></span>
              <button id="attachment-clear" aria-label="添付を解除" data-i18n-aria-label="app.attachment.clear">✕</button>
            </div>
            <div id="input-area">
              <div id="input-row">
                <button id="file-btn" class="file-btn" title="ファイル添付" aria-label="ファイルを添付" data-i18n-title="app.file.title" data-i18n-aria-label="app.file.ariaLabel">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                  </svg>
                </button>
                <button id="mic-btn" class="mic-btn" title="音声入力 (Ctrl+M)" aria-label="マイク: 待機中" data-i18n-title="app.mic.title" data-i18n-aria-label="app.mic.idle">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                  </svg>
                </button>
                <button id="agent-toggle-btn" class="agent-toggle-btn" title="エージェントモード OFF" aria-label="エージェントモード: OFF" data-i18n-title="app.agent.titleOff" data-i18n-aria-label="app.agent.ariaOff" style="display:none;">
                  <span style="font-size:16px;line-height:1;">&#x1F99E;</span>
                </button>
                <textarea id="user-input" rows="1" placeholder="話しかける..." data-i18n-placeholder="app.input.placeholder"></textarea>
                <button id="send-btn" aria-label="送信" data-i18n-aria-label="app.send">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                  </svg>
                </button>
              </div>
            </div>
            <input type="file" id="file-input" accept=".txt,.md,.csv,.json,.log,.pdf,.jpg,.jpeg,.png,.gif,.webp" style="display: none;">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initPlatform } from './platform';
    initPlatform().then(() => import('./docked'));
  </script>
</body>
</html>
